<!DOCTYPE html>
<html lang="fr" data-theme="dark" data-color="cosmos">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Beyma Flow</title>
<meta name="theme-color" content="#090b14"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{--font-d:'Playfair Display',serif;--font-b:'Outfit',sans-serif;--r:14px;--r-sm:9px;--tr:.22s cubic-bezier(.4,0,.2,1);--bar-h:58px;--pl-h:70px;--nav-h:62px}
[data-theme="dark"][data-color="cosmos"]{--bg:#090b14;--bg2:#0f1221;--bg3:#151929;--sf:#1c2035;--sf2:#232844;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);--ac:#7c6dfa;--ac2:#b3a8ff;--ac3:#3d30b8;--tx:#eceaf6;--tx2:#9894b8;--tx3:#5c5878;--dn:#ff6b8a;--ok:#6bffc8;--glow:rgba(124,109,250,.28)}
[data-theme="dark"][data-color="ocean"]{--bg:#060e18;--bg2:#0a1624;--bg3:#0f1e30;--sf:#152840;--sf2:#1c3350;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);--ac:#3fa9d4;--ac2:#7dd4f0;--ac3:#1a6a90;--tx:#e4f2fa;--tx2:#7aa8c4;--tx3:#3d6880;--dn:#ff6b8a;--ok:#6bffc8;--glow:rgba(63,169,212,.25)}
[data-theme="dark"][data-color="foret"]{--bg:#080e0a;--bg2:#0d1510;--bg3:#121c15;--sf:#192619;--sf2:#1f3020;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);--ac:#5dbe7a;--ac2:#95dea8;--ac3:#2e7a44;--tx:#e4f0e6;--tx2:#7aaa84;--tx3:#3d6644;--dn:#ff6b8a;--ok:#6bffc8;--glow:rgba(93,190,122,.25)}
[data-theme="dark"][data-color="sable"]{--bg:#110e08;--bg2:#1a1610;--bg3:#221e16;--sf:#2e2820;--sf2:#38322a;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);--ac:#c8944a;--ac2:#e8c080;--ac3:#8a5a20;--tx:#f0ece0;--tx2:#a8946a;--tx3:#6a5840;--dn:#ff6b8a;--ok:#6bffc8;--glow:rgba(200,148,74,.25)}
[data-theme="light"]{--bg:#f4f1e8;--bg2:#ede9df;--bg3:#e3dec5;--sf:#d8d2c4;--sf2:#ccc5b5;--bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.15);--ac:#5a4bef;--ac2:#7a6cee;--ac3:#3a2fcc;--tx:#1a1826;--tx2:#4a4660;--tx3:#8a8690;--dn:#d44060;--ok:#38a870;--glow:rgba(90,75,239,.15)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font-b);background:var(--bg);color:var(--tx);overflow-x:hidden;transition:background .4s,color .4s}
.noise{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:orbD 12s ease-in-out infinite alternate}
.orb-a{width:500px;height:500px;background:radial-gradient(circle,var(--glow),transparent 65%);top:-150px;left:-100px}
.orb-b{width:380px;height:380px;background:radial-gradient(circle,var(--glow),transparent 65%);bottom:-80px;right:-80px;animation-delay:-5s}
@keyframes orbD{from{transform:translate(0,0)}to{transform:translate(30px,-20px)}}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:16px}
.login-card{max-width:400px;width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:28px;padding:36px 28px;position:relative;z-index:1;text-align:center}
.lc-logo{display:flex;align-items:center;justify-content:center;margin-bottom:28px}
.lc-sub{color:var(--tx2);font-size:13px;margin-bottom:24px;line-height:1.6}
.user-btns{display:flex;flex-direction:column;gap:12px}
.ubtn{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--sf);border:1px solid var(--bd2);border-radius:14px;cursor:pointer;transition:all var(--tr);text-align:left;width:100%}
.ubtn:hover{border-color:var(--ac);background:var(--sf2);transform:translateY(-2px);box-shadow:0 8px 24px var(--glow)}
.ubtn:active{transform:scale(.97)}
.ubtn-av{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ubtn-av.u1{background:linear-gradient(135deg,#7c6dfa,#3d30b8)}
.ubtn-av.u2{background:linear-gradient(135deg,#e87040,#a83000)}
.ubtn-info h4{font-size:14px;font-weight:600;color:var(--tx)}
.ubtn-info p{font-size:12px;color:var(--tx3);margin-top:2px}
.lc-hint{font-size:11.5px;color:var(--tx3);margin-top:18px}
.fb-login-dot{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:14px;font-size:12px;color:var(--tx3)}
.fb-login-dot span.dot{width:7px;height:7px;border-radius:50%;background:var(--tx3);display:inline-block;transition:background .3s}

/* TOP BAR */
.bar{position:fixed;top:0;left:0;right:0;height:var(--bar-h);z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(9,11,20,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd)}
.bar-left{display:flex;align-items:center;gap:10px}
.bar-logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.bar-logo img{height:36px;width:auto;object-fit:contain}
.bar-brand{display:flex;flex-direction:column;line-height:1.1}
.bar-brand-top{font-family:var(--font-d);font-size:13px;font-weight:400;font-style:italic;color:var(--ac2);letter-spacing:.5px}
.bar-brand-bot{font-family:var(--font-b);font-size:14px;font-weight:700;color:var(--tx);letter-spacing:2.5px;text-transform:uppercase}
.bar-right{display:flex;align-items:center;gap:8px}
.ibt{width:36px;height:36px;border-radius:9px;border:none;background:none;color:var(--tx2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
.ibt:hover{background:var(--sf);color:var(--tx)}
.fb-dot{width:9px;height:9px;border-radius:50%;background:var(--tx3);box-shadow:none;transition:all .3s;flex-shrink:0}
.fb-dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.user-chip{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 5px;background:var(--sf);border:1px solid var(--bd2);border-radius:100px;cursor:pointer;font-size:12.5px;color:var(--tx2);transition:all var(--tr)}
.user-chip:hover{border-color:var(--ac)}
.uav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:600;flex-shrink:0}
.uav.u1{background:linear-gradient(135deg,#7c6dfa,#3d30b8)}
.uav.u2{background:linear-gradient(135deg,#e87040,#a83000)}

/* SIDEBAR */
.sidebar{position:fixed;left:0;top:var(--bar-h);bottom:var(--pl-h);width:204px;background:var(--bg2);border-right:1px solid var(--bd);padding:14px 8px;z-index:150;overflow-y:auto}
.sb-sec{font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;padding:12px 12px 5px;font-weight:600}
.sbb{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);cursor:pointer;color:var(--tx2);font-size:13px;transition:all var(--tr);border:none;background:none;font-family:var(--font-b);width:100%;text-align:left}
.sbb:hover{background:var(--sf);color:var(--tx)}
.sbb.active{background:rgba(124,109,250,.14);color:var(--ac2);font-weight:500}
.sbb .ic{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;min-width:20px;text-align:center}

/* BOTTOM NAV */
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(9,11,20,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.bot-nav-inner{display:flex;width:100%;height:100%;align-items:stretch;overflow-x:auto;scrollbar-width:none}
.bot-nav-inner::-webkit-scrollbar{display:none}
.bnb{flex:1;min-width:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--tx3);cursor:pointer;padding:4px 2px;transition:all var(--tr);font-family:var(--font-b)}
.bnb .b-ic{font-size:20px;transition:transform .2s}
.bnb .b-lb{font-size:9px;font-weight:500;white-space:nowrap}
.bnb.active{color:var(--ac2)}
.bnb.active .b-ic{transform:scale(1.15)}

/* MAIN */
.main{margin-left:204px;margin-top:var(--bar-h);padding:22px 22px calc(var(--pl-h)+20px);min-height:calc(100vh - var(--bar-h))}
.page{display:none;animation:pgIn .22s ease both}
.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ph{margin-bottom:20px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.pt{font-family:var(--font-d);font-size:clamp(26px,5vw,44px);font-weight:300;letter-spacing:-.5px}
.ps{color:var(--tx2);font-size:12.5px;margin-top:3px}

/* SEARCH */
.srch{position:relative;margin-bottom:16px}
.srch input{width:100%;background:var(--sf);border:1px solid var(--bd2);border-radius:100px;padding:11px 16px 11px 38px;font-family:var(--font-b);font-size:14px;color:var(--tx);outline:none;transition:border-color var(--tr)}
.srch input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(124,109,250,.1)}
.srch input::placeholder{color:var(--tx3)}
.srch .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:15px;pointer-events:none}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:14px}
.acard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all var(--tr);position:relative}
.acard:hover{transform:translateY(-3px);border-color:var(--bd2);box-shadow:0 12px 30px rgba(0,0,0,.3)}
.acard:active{transform:scale(.97)}
.acard.playing{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac),0 6px 24px var(--glow)}
.acard-cov{width:100%;padding-top:100%;position:relative;background:var(--bg3);overflow:hidden}
.acard-cov img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.acard-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px}
.acard-ov{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--tr)}
.acard:hover .acard-ov{opacity:1}
.acard-play{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:18px;color:#111}
.acard-tbns{position:absolute;top:7px;right:7px;display:flex;gap:3px}
.acb{width:28px;height:28px;border-radius:6px;background:rgba(0,0,0,.6);border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:#fff;transition:background var(--tr)}
.acb:hover{background:rgba(0,0,0,.85)}
.acb.fav-on{color:#ffcc44}
.acard-info{padding:12px}
.acard-info h4{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acard-info .card-artist{font-size:11.5px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acard-info .card-cat{font-size:10.5px;color:var(--tx3);margin-top:1px}
.acard-info .card-src{font-size:9.5px;color:var(--ac2);margin-top:2px;font-weight:500}
.pbars{display:flex;align-items:flex-end;gap:2px;height:12px;margin-top:5px}
.pbar{width:3px;border-radius:2px;background:var(--ac);animation:pbA var(--d,1s) ease-in-out infinite alternate}
@keyframes pbA{from{height:3px}to{height:100%}}

/* CTABS */
.ctabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:3px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ctabs::-webkit-scrollbar{display:none}
.ctab{padding:7px 16px;border-radius:100px;border:1px solid var(--bd2);background:none;color:var(--tx2);cursor:pointer;font-family:var(--font-b);font-size:12.5px;white-space:nowrap;transition:all var(--tr);flex-shrink:0}
.ctab.active{background:var(--ac);border-color:var(--ac);color:#fff}

/* UPLOAD ZONE */
.uzone{border:2px dashed var(--bd2);border-radius:var(--r);padding:28px 16px;text-align:center;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;margin-bottom:18px}
.uzone:hover,.uzone.drag{border-color:var(--ac);background:rgba(124,109,250,.04)}
.uzone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.uzone .u-ic{font-size:32px;margin-bottom:8px;display:block}
.uzone h3{font-size:14px;font-weight:500;margin-bottom:4px}
.uzone p{font-size:12px;color:var(--tx3)}
.up-prog{display:none;margin-top:10px}
.up-bw{height:4px;background:var(--sf2);border-radius:2px;overflow:hidden}
.up-bf{height:100%;background:linear-gradient(to right,var(--ac),var(--ac2));transition:width .2s;width:0}
.up-lbl{font-size:11px;color:var(--tx3);text-align:center;margin-top:5px}

/* CLOUD ADD ZONE */
.cloud-add{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:18px;margin-bottom:18px}
.cloud-add h3{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.cloud-add p{font-size:12px;color:var(--tx3);margin-bottom:14px;line-height:1.6}
.cloud-row{display:flex;gap:8px;flex-wrap:wrap}
.cloud-input{flex:1;min-width:200px;background:var(--bg3);border:1px solid var(--bd2);border-radius:9px;padding:10px 13px;color:var(--tx);font-family:var(--font-b);font-size:13px;outline:none;transition:border-color var(--tr)}
.cloud-input:focus{border-color:var(--ac)}
.cloud-input::placeholder{color:var(--tx3)}

/* AMBIENT */
.amb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.ambc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px 10px;text-align:center;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.ambc:hover{transform:translateY(-2px);border-color:var(--bd2)}
.ambc.on{border-color:var(--ac);background:rgba(124,109,250,.1);box-shadow:0 0 0 1px var(--ac),0 4px 16px var(--glow)}
.ambc .a-ic{font-size:30px;margin-bottom:7px;display:block}
.ambc .a-nm{font-size:11.5px;color:var(--tx2)}
.ambc.on .a-nm{color:var(--ac2)}
.ambc input[type=range]{width:100%;margin-top:8px;accent-color:var(--ac);display:none}
.ambc.on input[type=range]{display:block}
.a-wave{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(to right,var(--ac),var(--ac2));transform:scaleX(0);transform-origin:left;transition:transform var(--tr)}
.ambc.on .a-wave{transform:scaleX(1)}
.mix-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px;min-height:32px}
.mchip{display:flex;align-items:center;gap:7px;background:rgba(124,109,250,.12);border:1px solid rgba(124,109,250,.25);padding:6px 12px;border-radius:100px;font-size:12.5px;color:var(--ac2)}
.mchip button{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px}

/* RECORDER */
.rec-panel{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:22px 16px;max-width:660px}
.rec-cw{border-radius:10px;overflow:hidden;background:var(--bg3);margin-bottom:13px}
#rc{display:block;width:100%;height:60px}
.rec-t{font-family:var(--font-d);font-size:42px;font-weight:300;text-align:center;color:var(--tx2);margin-bottom:3px}
.rec-s{text-align:center;font-size:12px;color:var(--tx3);margin-bottom:13px}
.vfx-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:13px;padding-bottom:2px;scrollbar-width:none}
.vfxb{padding:5px 13px;border-radius:100px;border:1px solid var(--bd2);background:none;color:var(--tx2);font-family:var(--font-b);font-size:12px;cursor:pointer;transition:all var(--tr);white-space:nowrap;flex-shrink:0}
.vfxb.active{background:rgba(124,109,250,.15);border-color:var(--ac);color:var(--ac2)}
.rec-center{display:flex;justify-content:center;margin:6px 0 14px}
.rbtn{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#ff6060,#cc2020);border:4px solid rgba(255,96,96,.2);cursor:pointer;font-size:32px;display:flex;align-items:center;justify-content:center;transition:all var(--tr);box-shadow:0 0 28px rgba(255,96,96,.25)}
.rbtn.rec{animation:rP 1.4s ease-in-out infinite;background:linear-gradient(135deg,#ff3030,#aa0000)}
@keyframes rP{0%,100%{box-shadow:0 0 28px rgba(255,80,80,.25)}50%{box-shadow:0 0 60px rgba(255,80,80,.6)}}
.rec-actions{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.rab{padding:8px 16px;border-radius:100px;border:1px solid var(--bd2);background:none;color:var(--tx);font-family:var(--font-b);font-size:12.5px;cursor:pointer;transition:all var(--tr)}
.rab.pri{background:linear-gradient(135deg,var(--ac),var(--ac3));border-color:transparent;color:#fff}
.mix-tracks{display:flex;flex-direction:column;gap:9px}
.mtrack{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:var(--r-sm);padding:10px 12px}
.mt-ic{font-size:18px;width:24px;text-align:center}
.mt-info{flex:1}
.mt-nm{font-size:12.5px;font-weight:500}
.mt-vrow{display:flex;align-items:center;gap:8px;margin-top:3px}
.mt-vrow input{flex:1;accent-color:var(--ac)}
.mt-vrow span{font-size:11px;color:var(--tx3);width:27px}
.mtrm{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:4px;transition:color var(--tr)}
.mtrm:hover{color:var(--dn)}

/* MINI PLAYER */
.player{position:fixed;bottom:0;left:204px;right:0;height:var(--pl-h);z-index:190;background:rgba(9,11,20,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--bd);display:none;align-items:center;padding:0 16px;gap:14px;cursor:pointer}
.player.on{display:flex}
.pl-info{display:flex;align-items:center;gap:10px;flex-shrink:0;min-width:0;max-width:220px;pointer-events:none}
.pl-cov{width:44px;height:44px;border-radius:10px;overflow:hidden;background:var(--sf2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.pl-cov img{width:100%;height:100%;object-fit:cover}
.pl-nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.pl-art{font-size:10.5px;color:var(--tx3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-ctrl{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0;pointer-events:all}
.pl-btns{display:flex;align-items:center;gap:10px}
.plc{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:15px;padding:4px;transition:all var(--tr)}
.plc:hover{color:var(--tx);transform:scale(1.1)}
.plp{width:40px;height:40px;border-radius:50%;background:var(--ac);border:none;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--tr);flex-shrink:0}
.plp:hover{background:var(--ac2);transform:scale(1.06)}
.pl-prog-row{display:flex;align-items:center;gap:8px;width:100%}
.pl-t{font-size:10px;color:var(--tx3);font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}
.pl-prog{flex:1;height:3px;background:var(--sf2);border-radius:2px;cursor:pointer;min-width:0}
.pl-pf{height:100%;background:linear-gradient(to right,var(--ac),var(--ac2));border-radius:2px;transition:width .1s linear}
.pl-right{display:flex;align-items:center;gap:8px;flex-shrink:0;pointer-events:all}
.pl-vol{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--tx3)}
.pl-vol input{width:70px;accent-color:var(--ac)}
.pl-fav{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:17px;padding:4px;transition:color var(--tr);pointer-events:all}
.pl-fav.o
